name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    # Ref: https://github.com/tox-dev/action-pre-commit-uv
    - uses: tox-dev/action-pre-commit-uv@246b66536e366bb885f52d61983bf32f7c95e8b1 # 1.0.3

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install . --group=tests

    - name: Run tests
      run: pytest -ra --cov

    - name: Coveralls parallel
      uses: coverallsapp/github-action@v2
      with:
        flag-name: coverage-python-${{ matrix.python-version }}
        parallel: true
        base-path: tika

  finish-coverage:
    needs: test
    if: always()
    runs-on: ubuntu-slim
    steps:
    - name: Coveralls finished
      uses: coverallsapp/github-action@v2
      with:
        parallel-finished: true
        base-path: tika
